<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CryptoSentinel AI - Autonomous Deep-Market Exploration and Neural Trading framework.">
    <title>CryptoSentinel AI — Premium Trading Portal</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>

    <!-- Tech Stack (Pinned CDN-only) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
    <script>
        window.Motion = window.Motion || window.FramerMotion;
        window.FramerMotion = window.FramerMotion || window.Motion;
    </script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        heading: ["'Instrument Serif'", "serif"],
                        body: ["'Barlow'", "sans-serif"],
                        sans: ["'Inter'", "sans-serif"]
                    },
                    borderRadius: {
                        DEFAULT: "9999px"
                    }
                }
            }
        }
    </script>

    <!-- Liquid-glass Utilities -->
    <style>
        .liquid-glass {
            background: rgba(255,255,255,0.015);
            background-blend-mode: luminosity;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: none;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .liquid-glass::before {
            content: "";
            position: absolute; inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg,
            rgba(255,255,255,0.3) 0%,
            rgba(255,255,255,0.1) 20%,
            rgba(255,255,255,0) 40%,
            rgba(255,255,255,0) 60%,
            rgba(255,255,255,0.1) 80%,
            rgba(255,255,255,0.3) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            -webkit-mask-composite: exclude;
            mask-composite: exclude;
            pointer-events: none;
        }

        .liquid-glass-strong {
            background: rgba(255,255,255,0.02);
            background-blend-mode: luminosity;
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: none;
            box-shadow: 4px 4px 4px rgba(0,0,0,0.1), inset 0 1px 1px rgba(255,255,255,0.15);
            position: relative;
            overflow: hidden;
        }

        .liquid-glass-strong::before {
            content: "";
            position: absolute; inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg,
            rgba(255,255,255,0.4) 0%,
            rgba(255,255,255,0.15) 20%,
            rgba(255,255,255,0) 40%,
            rgba(255,255,255,0) 60%,
            rgba(255,255,255,0.15) 80%,
            rgba(255,255,255,0.4) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            -webkit-mask-composite: exclude;
            mask-composite: exclude;
            pointer-events: none;
        }

        body {
            background-color: #000;
            overflow-x: hidden;
        }

        /* Custom scrollbar for glassmorphic style */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- Root Mounting Element -->
    <div id="root"></div>

    <!-- Babel script loading of components (order matters to load dependency exports onto window) -->
    <script type="text/babel" src="components/FadingVideo.js"></script>
    <script type="text/babel" src="components/BlurText.js"></script>
    <script type="text/babel" src="components/Navbar.js"></script>
    <script type="text/babel" src="components/Hero.js"></script>
    <script type="text/babel" src="components/Capabilities.js"></script>
    <script type="text/babel" src="components/Dashboard.js"></script>
    <script type="text/babel" src="components/ArtGenerator.js"></script>
    <script type="text/babel" src="components/App.js"></script>

    <!-- Mount React Application -->
    <script type="text/babel">
        const mountApp = () => {
            const container = document.getElementById("root");
            if (container) {
                const root = ReactDOM.createRoot(container);
                root.render(<window.App />);
            }
        };

        if (document.readyState === "complete" || document.readyState === "interactive") {
            setTimeout(mountApp, 100);
        } else {
            window.addEventListener("load", () => setTimeout(mountApp, 100));
        }
    </script>
</body>
</html>
